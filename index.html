<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinder</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Courier New, monospace;
      background: radial-gradient(circle at top, #28150b, #090603 70%);
    }
    .card {
      width: min(640px, 100%);
      background: #f6e3b7;
      border: 2px solid #c6a15d;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,.5);
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: #dbc48e;
      border-bottom: 1px solid #b58e4e;
      color: #4c3419;
      font-weight: bold;
    }
    .body {
      min-height: 300px;
      padding: 28px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      font-size: 18px;
      color: #2f2011;
      background-image: linear-gradient(#e4d0a1 1px, transparent 1px);
      background-size: 100% 30px;
    }
    .bar {
      width: 100%;
      height: 8px;
      background: #ff7a2f;
      transition: width 1s linear, background 1s linear;
    }
    .low { background: #9c2f10; }
    .ash {
      text-align: center;
      color: #7b6a59;
      font-size: 28px;
      letter-spacing: 4px;
      padding: 90px 20px;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <div>CINDER</div>
      <div id="timer">--</div>
    </div>
    <div class="body" id="note">Loading...</div>
    <div class="bar" id="bar"></div>
  </div>

  <script>
    const params = new URLSearchParams(location.hash.slice(1));
    const noteEl = document.getElementById('note');
    const timerEl = document.getElementById('timer');
    const barEl = document.getElementById('bar');

    let note = params.get('note') || 'No note found.';
    let ttl = parseInt(params.get('ttl'), 10);

    if (!Number.isFinite(ttl)) ttl = 5;
    if (ttl < 3) ttl = 3;
    if (ttl > 30) ttl = 30;

    try {
      note = decodeURIComponent(note);
    } catch {
      note = 'Could not decode note.';
    }

    let remaining = ttl;

    noteEl.textContent = note;
    timerEl.textContent = remaining + 's';
    barEl.style.width = '100%';

    const interval = setInterval(() => {
      remaining--;

      if (remaining <= 0) {
        clearInterval(interval);
        timerEl.textContent = 'ASH';
        noteEl.innerHTML = '<div class="ash">ASH</div>';
        barEl.style.width = '0%';
        barEl.classList.add('low');
        return;
      }

      timerEl.textContent = remaining + 's';
      barEl.style.width = (remaining / ttl * 100) + '%';
      if (remaining <= 2) barEl.classList.add('low');
    }, 1000);
  </script>
</body>
</html>
