<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinder</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      font-family: Courier New, monospace;
      background: radial-gradient(circle at top, #28150b, #090603 70%);
      perspective: 1000px;
    }
    .card {
      width: min(640px, 100%);
      height: 500px;
      background: #f6e3b7;
      border: 2px solid #c6a15d;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,.5);
      position: relative;
      transform-style: preserve-3d;
      transition: transform 1s ease-out;
    }
    .card.burning {
      animation: paperBurn 2s ease-out forwards;
    }
    @keyframes paperBurn {
      0% { transform: rotateX(0deg) rotateY(0deg) scale(1); }
      50% { transform: rotateX(45deg) rotateY(-30deg) rotateZ(15deg) scale(0.95); }
      100% { transform: rotateX(90deg) rotateY(-60deg) rotateZ(90deg) scale(0.3) translateZ(-200px); opacity: 0; }
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: #dbc48e;
      border-bottom: 1px solid #b58e4e;
      color: #4c3419;
      font-weight: bold;
      position: relative;
      z-index: 2;
    }
    .body {
      height: calc(100% - 50px);
      padding: 28px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      font-size: 18px;
      color: #2f2011;
      background-image: linear-gradient(#e4d0a1 1px, transparent 1px);
      background-size: 100% 30px;
      position: relative;
      overflow: hidden;
    }
    .burn-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at bottom right, transparent 40%, rgba(255,80,0,0.6) 70%);
      opacity: 0;
      transition: opacity 0.5s;
      pointer-events: none;
    }
    .bar {
      width: 100%;
      height: 8px;
      background: #ff7a2f;
      transition: width 1s linear, background 1s linear;
    }
    .low { background: #9c2f10; }
    .ash {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #7b6a59;
      font-size: 32px;
      letter-spacing: 6px;
      font-weight: bold;
      opacity: 0;
      animation: ashFade 1s 1.5s forwards;
    }
    @keyframes ashFade {
      to { opacity: 1; }
    }
    .particles {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: #8a7a66;
      border-radius: 50%;
      opacity: 0;
      animation: floatAway 2s forwards;
    }
    @keyframes floatAway {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0.8; }
      100% { transform: translateY(-100px) translateX(50px) rotate(360deg) scale(0); opacity: 0; }
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="topbar">
      <div>CINDER</div>
      <div id="timer">--</div>
    </div>
    <div class="body" id="note">Loading...</div>
    <div class="burn-overlay" id="burnOverlay"></div>
    <div class="ash" id="ash">ASH</div>
    <div class="particles" id="particles"></div>
    <div class="bar" id="bar"></div>
  </div>

  <script>
    const params = new URLSearchParams(location.hash.slice(1));
    const noteEl = document.getElementById('note');
    const timerEl = document.getElementById('timer');
    const barEl = document.getElementById('bar');
    const cardEl = document.getElementById('card');
    const burnOverlayEl = document.getElementById('burnOverlay');
    const ashEl = document.getElementById('ash');
    const particlesEl = document.getElementById('particles');

    let note = params.get('note') || 'No note found.';
    let ttl = parseInt(params.get('ttl'), 10);

    if (!Number.isFinite(ttl)) ttl = 5;
    if (ttl < 3) ttl = 3;
    if (ttl > 30) ttl = 30;

    try {
      note = decodeURIComponent(note);
    } catch {
      note = 'Could not decode note.';
    }

    let remaining = ttl;

    noteEl.textContent = note;
    timerEl.textContent = remaining + 's';
    barEl.style.width = '100%';

    const interval = setInterval(() => {
      remaining--;

      if (remaining <= 0) {
        clearInterval(interval);
        timerEl.textContent = '💀';
        barEl.style.width = '0%';
        barEl.classList.add('low');
        
        // Start the 3D burn animation
        burnOverlayEl.style.opacity = '1';
        cardEl.classList.add('burning');
        
        // Create ash particles
        for (let i = 0; i < 20; i++) {
          const particle = document.createElement('div');
          particle.className = 'particle';
          particle.style.left = Math.random() * 100 + '%';
          particle.style.top = Math.random() * 100 + '%';
          particle.style.animationDelay = Math.random() * 0.5 + 's';
          particlesEl.appendChild(particle);
        }
        
        return;
      }

      timerEl.textContent = remaining + 's';
      barEl.style.width = (remaining / ttl * 100) + '%';
      if (remaining <= 2) barEl.classList.add('low');
    }, 1000);
  </script>
</body>
</html>
