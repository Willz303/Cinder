<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cinder • one-time note</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(ellipse at 30% 40%, #1f130b, #030201);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', 'SF Mono', monospace;
      padding: 1.5rem;
      perspective: 1400px;
    }

    .cinder-card {
      width: 100%;
      max-width: 700px;
      background: #fff7e8;
      background-image: linear-gradient(to bottom, #fdf8ed 0%, #fef2df 100%);
      border-radius: 28px 28px 24px 24px;
      box-shadow: 0 30px 45px rgba(0, 0, 0, 0.5), 0 0 0 1px #e9ce9e inset, 0 0 0 2px #fff6e6 inset;
      transition: transform 2.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 1.2s ease-out;
      transform-style: preserve-3d;
      opacity: 1;
    }

    .cinder-card.burned-away {
      transform: rotateX(105deg) rotateY(-25deg) rotateZ(25deg) scale(0.08);
      opacity: 0;
      filter: blur(6px);
      pointer-events: none;
      transition: transform 1.6s cubic-bezier(0.34, 1.2, 0.55, 1), opacity 1.2s ease;
    }

    .note-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 1rem 1.8rem;
      background: #ebdbba;
      border-radius: 28px 28px 12px 12px;
      border-bottom: 2px solid #cfb175;
      color: #3d2b18;
      font-weight: bold;
    }

    .brand {
      display: flex;
      gap: 8px;
      align-items: center;
      font-size: 1.15rem;
    }

    .flame-icon {
      font-size: 1.3rem;
      filter: drop-shadow(0 0 2px #ff7b2c);
    }

    .timer-badge {
      background: #2e241b;
      padding: 0.3rem 0.9rem;
      border-radius: 100px;
      font-family: monospace;
      font-weight: bold;
      color: #ffb26e;
      font-size: 1rem;
    }

    .note-body {
      padding: 2rem 2rem 2.5rem 2rem;
      min-height: 320px;
      font-size: 1.3rem;
      line-height: 1.65;
      color: #2f2419;
      white-space: pre-wrap;
      word-break: break-word;
      background: repeating-linear-gradient(#fff3e0 0px, #fff3e0 27px, #eadbbe 28px);
      font-family: 'Courier New', monospace;
      transition: opacity 0.9s ease-out;
    }

    .ember-bar {
      width: 100%;
      height: 7px;
      background: #ff8233;
      transition: width 0.05s linear;
      border-radius: 0 0 24px 24px;
    }

    .burn-overlay-fire {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 40% 85%, rgba(255, 100, 20, 0.6) 5%, rgba(255, 40, 0, 0.4) 45%, transparent 80%);
      mix-blend-mode: multiply;
      border-radius: inherit;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.8s cubic-bezier(0.3, 0.9, 0.6, 1);
      z-index: 5;
    }

    .sparks {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 8;
      overflow: hidden;
      border-radius: inherit;
    }

    .spark {
      position: absolute;
      width: 4px;
      height: 4px;
      background: radial-gradient(circle, #ffa859, #ff4d0d);
      border-radius: 50%;
      opacity: 0;
      animation: cinderSpark 1.6s forwards ease-out;
    }

    @keyframes cinderSpark {
      0% { transform: translateY(0) scale(1); opacity: 0.9; }
      100% { transform: translateY(-130px) translateX(50px) rotate(300deg) scale(0); opacity: 0; }
    }

    .card-wrapper {
      position: relative;
      width: 100%;
      max-width: 720px;
      margin: 0 auto;
    }
  </style>
</head>
<body>
<div class="card-wrapper" id="appRoot">
  <div class="cinder-card" id="paperCard">
    <div class="note-header">
      <div class="brand"><span class="flame-icon">🔥</span><span>CINDER</span></div>
      <div class="timer-badge" id="timerDisplay">—</div>
    </div>
    <div class="note-body" id="noteContent"></div>
    <div class="ember-bar" id="burnProgress"></div>
    <div class="burn-overlay-fire" id="fireOverlay"></div>
    <div class="sparks" id="sparkContainer"></div>
  </div>
</div>

<script>
  (function() {
    // ---------- ONE-TIME FIX: use sessionStorage + URL token to prevent replay ----------
    // The note can only be viewed ONCE per unique session token.
    // Generate a random ID for this specific view attempt. The link contains a token.
    // But the extension DOES NOT include a token yet. So we need to generate one on first view,
    // and then invalidate it. However, that still allows re-pasting original link.
    //
    // TRUE SOLUTION: The extension should generate a random ?id= or #id= that gets invalidated.
    // But you want NO BACKEND. So we do this: on first view, we mark that specific note+ttl combination
    // as "viewed" using sessionStorage + a hash of the note content.
    // BUT careful: same note + same ttl would be blocked even for different senders? Rare edge case.
    // Better: generate a unique read-once key from the URL + a timestamp derived from first load.
    // However, simplest: use sessionStorage with a key derived from the entire URL fragment.
    // When someone pastes the link again, the same key exists => already viewed => void.
    //
    // This makes it ONE-TIME per browser session only. If user clears sessionStorage, they could re-read.
    // But for most threat models, that's fine. To make it truly permanent, we'd need a backend.
    
    const urlFragment = window.location.hash.substring(1);
    if (!urlFragment || !urlFragment.includes('note=')) {
      // no note -> black void
      document.body.innerHTML = '';
      document.body.style.background = '#000000';
      return;
    }
    
    // Create a unique key for this exact URL (including note content)
    // This ensures the same link cannot be viewed twice in the same browser session.
    const viewKey = 'cinder_viewed_' + encodeURIComponent(urlFragment);
    
    if (sessionStorage.getItem(viewKey) === 'true') {
      // Already viewed once -> permanent black void
      document.body.innerHTML = '';
      document.body.style.background = '#000000';
      return;
    }
    
    // Mark as viewed immediately! Even before displaying.
    // This prevents the same link from working again.
    sessionStorage.setItem(viewKey, 'true');
    
    // --- proceed to display the note normally ---
    const params = new URLSearchParams(urlFragment);
    let rawNote = params.get('note');
    let ttlRaw = params.get('ttl');
    
    if (!rawNote) {
      document.body.innerHTML = '';
      document.body.style.background = '#000000';
      return;
    }
    
    let finalNote = '';
    try {
      finalNote = decodeURIComponent(rawNote);
    } catch(e) {
      finalNote = rawNote;
    }
    
    if (!finalNote.trim()) {
      document.body.innerHTML = '';
      document.body.style.background = '#000000';
      return;
    }
    
    let duration = parseInt(ttlRaw, 10);
    if (isNaN(duration) || duration < 2) duration = 3;
    if (duration > 30) duration = 30;
    
    const card = document.getElementById('paperCard');
    const timerSpan = document.getElementById('timerDisplay');
    const noteContainer = document.getElementById('noteContent');
    const progressBar = document.getElementById('burnProgress');
    const fireOverlay = document.getElementById('fireOverlay');
    const sparksContainer = document.getElementById('sparkContainer');
    
    noteContainer.textContent = finalNote;
    let remainingSeconds = duration;
    timerSpan.textContent = `${remainingSeconds}s`;
    progressBar.style.width = '100%';
    
    let isDestroyed = false;
    
    function spawnParticles() {
      if (!sparksContainer) return;
      for (let i = 0; i < 58; i++) {
        const spark = document.createElement('div');
        spark.classList.add('spark');
        spark.style.left = (Math.random() * 90 + 5) + '%';
        spark.style.top = (Math.random() * 80 + 10) + '%';
        spark.style.animationDuration = Math.random() * 1.4 + 0.7 + 's';
        sparksContainer.appendChild(spark);
      }
    }
    
    function executeBurn() {
      if (isDestroyed) return;
      isDestroyed = true;
      
      if (fireOverlay) fireOverlay.style.opacity = '0.95';
      if (noteContainer) noteContainer.style.opacity = '0';
      if (progressBar) {
        progressBar.style.width = '0%';
      }
      
      spawnParticles();
      
      // Clean the URL so refresh shows nothing
      if (window.history && window.history.replaceState) {
        window.history.replaceState(null, '', window.location.pathname);
      }
      
      if (card) {
        card.classList.add('burned-away');
      }
      
      setTimeout(() => {
        const rootDiv = document.getElementById('appRoot');
        if (rootDiv) {
          rootDiv.innerHTML = '';
          rootDiv.style.display = 'none';
        }
        document.body.innerHTML = '';
        document.body.style.background = '#000000';
        document.body.style.margin = '0';
        document.body.style.padding = '0';
        document.body.style.minHeight = '100vh';
      }, 900);
    }
    
    let intervalId = setInterval(() => {
      if (isDestroyed) {
        if (intervalId) clearInterval(intervalId);
        return;
      }
      if (remainingSeconds <= 1) {
        clearInterval(intervalId);
        executeBurn();
        return;
      }
      remainingSeconds--;
      if (timerSpan) timerSpan.textContent = `${remainingSeconds}s`;
      const percent = (remainingSeconds / duration) * 100;
      if (progressBar) progressBar.style.width = `${percent}%`;
      if (remainingSeconds <= 2 && fireOverlay) fireOverlay.style.opacity = '0.4';
    }, 1000);
    
    if (duration <= 0) executeBurn();
  })();
</script>
</body>
</html>
