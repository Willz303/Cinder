<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cinder</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Courier New, monospace;
      background: radial-gradient(circle at top, #2a160c, #090603 70%);
      color: #2b1c10;
      padding: 20px;
    }
    .card {
      width: min(640px, 100%);
      background: #f7e7be;
      border: 2px solid #c8a86a;
      border-radius: 14px;
      box-shadow: 0 20px 50px rgba(0,0,0,.45);
      overflow: hidden;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      padding: 12px 16px;
      background: #dbc48e;
      border-bottom: 1px solid #b89455;
      font-weight: bold;
    }
    .body {
      padding: 28px;
      min-height: 280px;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.6;
      font-size: 18px;
      background-image: linear-gradient(#ead8b0 1px, transparent 1px);
      background-size: 100% 30px;
    }
    .ash {
      text-align: center;
      color: #7d6a55;
      font-size: 28px;
      letter-spacing: 4px;
      padding: 80px 20px;
    }
    .bar {
      height: 8px;
      background: #ff7a2f;
      width: 100%;
      transition: width 1s linear, background 1s linear;
    }
    .low { background: #9e2f10; }
  </style>
</head>
<body>
  <div class="card">
    <div class="topbar">
      <div>CINDER</div>
      <div id="timer">--</div>
    </div>
    <div class="body" id="note">Loading...</div>
    <div class="bar" id="bar"></div>
  </div>

  <script>
    const hash = new URLSearchParams(location.hash.slice(1));
    const noteEl = document.getElementById('note');
    const timerEl = document.getElementById('timer');
    const barEl = document.getElementById('bar');

    let note = hash.get('note') || 'No note found.';
    let ttl = parseInt(hash.get('ttl'), 10);

    if (!Number.isFinite(ttl) || ttl < 3) ttl = 5;
    if (ttl > 30) ttl = 30;

    try { note = decodeURIComponent(note); } catch { note = 'Could not decode note.'; }

    let remaining = ttl;
    noteEl.textContent = note;
    timerEl.textContent = remaining + 's';
    barEl.style.width = '100%';

    const tick = () => {
      remaining -= 1;

      if (remaining <= 0) {
        timerEl.textContent = 'ASH';
        noteEl.innerHTML = '<div class="ash">ASH</div>';
        barEl.style.width = '0%';
        barEl.classList.add('low');
        clearInterval(interval);
        return;
      }

      timerEl.textContent = remaining + 's';
      barEl.style.width = (remaining / ttl * 100) + '%';
      if (remaining <= 2) barEl.classList.add('low');
    };

    const interval = setInterval(tick, 1000);
  </script>
</body>
</html>
